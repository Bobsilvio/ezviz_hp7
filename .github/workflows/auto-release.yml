name: Auto Release on manifest bump

# When custom_components/ezviz_hp7/manifest.json changes on main and the
# new "version" field doesn't already have a matching git tag, this
# workflow:
#   1. Reads the version out of the manifest.
#   2. Tags vX.Y.Z on the current commit.
#   3. Creates + publishes a GitHub Release with auto-generated notes.
#
# The release-drafter workflow keeps an in-progress draft up to date in
# the meantime; once we publish here it disappears and a fresh draft for
# the next version starts accumulating commits.

on:
  push:
    branches:
      - main
    paths:
      - 'custom_components/ezviz_hp7/manifest.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest
        id: ver
        run: |
          version=$(jq -r '.version' custom_components/ezviz_hp7/manifest.json)
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::error::manifest.json has no version field"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version"    >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists — skipping release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
